<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Petit Chef Vincent</title><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#FDF6EC;font-family:Georgia,serif}header{background:#3E2008;color:#C49A6C;text-align:center;padding:16px}header h1{font-size:1.3rem}header p{font-size:.85rem;margin-top:4px}.zone{display:flex;align-items:center;gap:12px;padding:16px;background:#f5e6d0;border-bottom:2px solid #C49A6C}.avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#6B3A2A,#C49A6C);display:flex;align-items:center;justify-content:center;font-size:2.2rem;border:3px solid #3E2008;flex-shrink:0}.bubble{background:white;border-radius:16px;padding:12px;font-size:.9rem;color:#3E2008;border:2px solid #C49A6C;flex:1}.vbtn{display:block;margin:8px auto;background:#FDF6EC;border:2px solid #C49A6C;color:#3E2008;font-size:.9rem;font-weight:700;padding:8px 20px;border-radius:30px;cursor:pointer;font-family:inherit}.periods{display:flex;gap:8px;padding:10px 16px;overflow-x:auto}.pbtn{background:white;border:2px solid #C49A6C;color:#6B3A2A;padding:7px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;font-family:inherit;font-size:.82rem}.pbtn.on{background:#6B3A2A;color:#FDF6EC}.stitle{padding:10px 16px 4px;font-size:.78rem;color:#6B3A2A;font-weight:bold;text-transform:uppercase;letter-spacing:1px}.qgrid{display:flex;flex-direction:column;gap:6px;padding:0 16px 10px}.qbtn{background:white;border:2px solid #C49A6C;color:#3E2008;padding:9px 12px;border-radius:12px;cursor:pointer;text-align:left;font-family:inherit;font-size:.88rem}.chat{padding:14px;display:flex;flex-direction:column;gap:10px;min-height:150px}.msg{max-width:85%;padding:11px 14px;border-radius:16px;font-size:.9rem;line-height:1.5}.msg.u{background:#6B3A2A;color:white;align-self:flex-end;border-radius:16px 16px 4px 16px}.msg.c{background:white;color:#3E2008;align-self:flex-start;border:2px solid #C49A6C;border-radius:16px 16px 16px 4px}.sbtn{margin-top:6px;background:#FDF6EC;border:1px solid #C49A6C;color:#6B3A2A;padding:5px 12px;border-radius:20px;cursor:pointer;font-size:.8rem;font-family:inherit}.dots{display:flex;gap:5px;padding:10px}.dot{width:9px;height:9px;background:#C49A6C;border-radius:50%;animation:b 1s infinite}.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}@keyframes b{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}.input{display:flex;gap:8px;padding:10px 14px;border-top:2px solid #C49A6C;background:#FDF6EC;position:sticky;bottom:0}.input textarea{flex:1;border:2px solid #C49A6C;border-radius:12px;padding:9px 12px;font-family:inherit;font-size:.9rem;background:white;color:#3E2008;resize:none;min-height:44px}.sbnd{width:44px;height:44px;background:#6B3A2A;border:none;border-radius:50%;cursor:pointer;font-size:1.1rem;color:white;flex-shrink:0}footer{text-align:center;padding:10px;font-size:.75rem;color:#C49A6C}</style></head><body><header><h1>👨‍🍳 Petit Chef Vincent</h1><p>Ton compagnon pâtissier à travers l'Histoire ✨</p></header><div class="zone"><div class="avatar">👨‍🍳</div><div class="bubble">Bonjour petit gourmand ! 🎉<br>Pose-moi tes questions sur nos recettes historiques !</div></div><button class="vbtn" id="vb" onclick="av()">🔊 Activer la voix</button><p class="stitle">🕰️ Choisis une période</p><div class="periods"><button class="pbtn on" onclick="sp(this,'t')">Toutes</button><button class="pbtn" onclick="sp(this,'a')">🏛️ Antiquité</button><button class="pbtn" onclick="sp(this,'m')">⚔️ Moyen Âge</button><button class="pbtn" onclick="sp(this,'mo')">🕯️ Temps modernes</button><button class="pbtn" onclick="sp(this,'x')">🚀 XIXe–XXIe s.</button></div><p class="stitle">⚡ Questions rapides</p><div class="qgrid"><button class="qbtn" onclick="aq('C\'est quoi le savillum ?')">🍰 C'est quoi le savillum ?</button><button class="qbtn" onclick="aq('Pourquoi le faludhaj devient solide ?')">🔬 Pourquoi le faludhaj devient solide ?</button><button class="qbtn" onclick="aq('Qui est Marie-Antoine Carême ?')">👑 Qui est Marie-Antoine Carême ?</button><button class="qbtn" onclick="aq('C\'est quoi la gélatine ?')">✨ C'est quoi la gélatine ?</button></div><div class="chat" id="chat"></div><div class="input"><textarea id="inp" placeholder="Pose ta question..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sm()}"></textarea><button class="sbnd" onclick="sm()">🍴</button></div><footer>★★★ Viens pâtisser avec Petit Chef Vincent ! — Vincent Marmeisse ★★★</footer><script>const R={"c'est quoi le savillum":"Quelle bonne question ! 🍰 Le savillum c'est un gâteau au fromage de l'Antiquité romaine ! On le faisait avec du fromage de brebis, du miel, de la farine et des œufs. La recette a été écrite par Caton l'Ancien au IIe siècle avant Jésus-Christ. C'est comme un ancêtre du cheesecake !","pourquoi le faludhaj devient solide":"Quel esprit scientifique ! 🔬 Le faludhaj devient solide grâce à l'amidon ! Quand on le chauffe dans l'eau, il gonfle et forme un réseau qui retient l'eau. En refroidissant, ce réseau se solidifie comme par magie — exactement comme la maïzena aujourd'hui. Les cuisiniers de Bagdad avaient découvert ce secret il y a plus de 1000 ans !","qui est marie-antoine careme":"Oh, un grand nom ! 👑 Marie-Antoine Carême est le premier grand chef de l'Histoire ! Né en 1784, il a cuisiné pour les plus grands rois d'Europe. Son blanc-manger au lait d'amandes et à la gélatine est une merveille. Il a vraiment inventé la pâtisserie moderne !","c'est quoi la gelatine":"Super question ! ✨ La gélatine c'est une substance transparente qui fait prendre les crèmes et gelées ! Elle vient des os des animaux. Quand on la chauffe puis qu'on laisse refroidir, elle forme un filet invisible qui retient tout. C'est ce secret que Carême utilisait pour son blanc-manger !"};let th=false;function n(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s]/g,'').trim()}function sp(b,p){document.querySelectorAll('.pbtn').forEach(x=>x.classList.remove('on'));b.classList.add('on');if(p!=='t'&&p!=='a')am('chef','🚧 Cette période est en cours de construction ! Pour l\'instant je connais surtout l\'Antiquité 😊')}function aq(q){document.getElementById('inp').value=q;sm()}function am(r,t){const c=document.getElementById('chat'),d=document.createElement('div');d.className='msg '+(r==='user'?'u':'c');d.textContent=t;if(r==='chef'){const b=document.createElement('button');b.className='sbtn';b.textContent='🔊 Écouter';b.onclick=()=>sp2(t,b);d.appendChild(document.createElement('br'));d.appendChild(b)}c.appendChild(d);c.scrollTop=c.scrollHeight}function st(){const c=document.getElementById('chat'),d=document.createElement('div');d.className='msg c dots';d.id='th';d.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';c.appendChild(d);c.scrollTop=c.scrollHeight}function ht(){const t=document.getElementById('th');if(t)t.remove()}async function sm(){const i=document.getElementById('inp'),t=i.value.trim();if(!t||th)return;i.value='';am('user',t);th=true;const nk=n(t),fk=Object.keys(R).find(k=>nk.includes(k));if(fk){st();await new Promise(r=>setTimeout(r,700));ht();am('chef',R[fk]);th=false;return}st();try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,system:'Tu es Petit Chef Vincent, guide gourmand jeunesse. Réponds en 3 phrases max, avec des émojis, pour des enfants de 7-10 ans. Tu parles de 12 recettes historiques : Savillum, Dulcia domestica, Faludhaj, Ka\'k, Taillis, Tarta de Santiago, Flan, Pound Cake, Massepain, Blanc-Manger de Carême, Gâteau de guerre, Mousse Spatiale.',messages:[{role:'user',content:t}]})});const d=await r.json();ht();am('chef',d.content?.[0]?.text||'Oups ! Réessaie 😊')}catch(e){ht();am('chef','Je suis momentanément indisponible. Réessaie dans un instant ! 🍰')}th=false}function sp2(t,b){if(!window.speechSynthesis){alert('Voix non disponible dans ce navigateur.');return}window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='fr-FR';u.rate=0.9;if(b)b.textContent='🔊 En cours…';u.onend=()=>{if(b)b.textContent='🔊 Écouter'};u.onerror=()=>{if(b)b.textContent='🔊 Écouter'};window.speechSynthesis.speak(u)}function av(){if(!window.speechSynthesis){document.getElementById('vb').textContent='⚠️ Voix non supportée';return}window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance('Bonjour petit gourmand !');u.lang='fr-FR';u.rate=0.9;window.speechSynthesis.speak(u);const b=document.getElementById('vb');b.textContent='🔊 Voix activée !';b.style.background='#4CAF50';b.style.color='white';b.disabled=true}</script></body></html>
